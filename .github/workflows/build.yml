name: Build Flatpak

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["main"]

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # Add flathub for both user and system (flatpak-github-actions uses --system)
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.rancherdesktop.app.flatpak
          manifest-path: io.rancherdesktop.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          repo-dir: repo

      - name: Upload repo artifact for Pages deployment
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo/
          retention-days: 1

      - name: Comment PR with install instructions
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifactName = 'rancher-desktop-flatpak';
            const nightlyLink = `https://nightly.link/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/${artifactName}.zip`;

            const body = `### 📦 Flatpak Build Ready for Testing!

            \`\`\`bash
            wget ${nightlyLink}
            unzip ${artifactName}.zip
            flatpak --user install io.rancherdesktop.app.flatpak -y
            flatpak run io.rancherdesktop.app
            \`\`\`
            `;

            const opts = github.rest.issues.listComments.endpoint.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const comments = await github.paginate(opts);
            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Flatpak Build Ready for Testing!')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  deploy-pages:
    name: Deploy Flatpak Repo to GitHub Pages
    runs-on: ubuntu-latest
    needs: flatpak
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download repo artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: repo/

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
